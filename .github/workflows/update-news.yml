@@ -16,246 +18,29 @@ jobs:
steps:
- name: Checkout repository
uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate news.json
        run: |
          python - <<'PY'
          import json
          import re
          import urllib.request
          import xml.etree.ElementTree as ET
          from html import unescape
          from email.utils import parsedate_to_datetime
          from datetime import datetime, timezone

          GOOGLE_NEWS_INTL = "https://news.google.com/rss/search?q=world+news+OR+international+news&hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
          GOOGLE_NEWS_USA = "https://news.google.com/rss/search?q=%E7%BE%8E%E5%9C%8B+OR+%E7%99%BD%E5%AE%AE+OR+%E8%8F%AF%E7%9B%9B%E9%A0%93&hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
          GOOGLE_NEWS_TECH = "https://news.google.com/rss/search?q=AI+OR+%E4%BA%BA%E5%B7%A5%E6%99%BA%E6%85%A7+OR+%E7%A7%91%E6%8A%80&hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
          GOOGLE_NEWS_TAIWAN = "https://news.google.com/rss/search?q=%E5%8F%B0%E7%81%A3&hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
          GOOGLE_NEWS_HEALTH = "https://news.google.com/rss/search?q=%E5%81%A5%E5%BA%B7+OR+%E9%86%AB%E7%99%82+OR+%E9%86%AB%E8%97%A5&hl=zh-TW&gl=TW&ceid=TW:zh-Hant"

          UDN_GLOBAL_URL = "https://global.udn.com/global_vision/index"
          KOC_URL = "https://www.koc.com.tw/"
          FM_MAIN = "https://frequentmiler.com/feed/"
          FM_QUICK = "https://frequentmiler.com/category/quick-deals/feed/"

          BROWSER_HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "zh-TW,zh;q=0.9,en-US;q=0.8,en;q=0.7",
              "Cache-Control": "no-cache",
              "Pragma": "no-cache",
          }

          def now_iso():
              return datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          def fetch_bytes(url):
              req = urllib.request.Request(url, headers=BROWSER_HEADERS)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return resp.read()

          def fetch_text(url):
              req = urllib.request.Request(url, headers=BROWSER_HEADERS)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  charset = resp.headers.get_content_charset() or "utf-8"
                  return resp.read().decode(charset, errors="ignore")

          def to_iso8601(dt_str):
              try:
                  dt = parsedate_to_datetime(dt_str)
                  if dt.tzinfo is None:
                      dt = dt.replace(tzinfo=timezone.utc)
                  return dt.astimezone(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
              except Exception:
                  return dt_str or ""

          def clean_title(title):
              title = unescape(title or "").strip()
              title = re.sub(r"\s+", " ", title)
              title = re.sub(r"\s*-\s*[^-]+$", "", title)
              return title

          def normalize_title(title):
              title = clean_title(title).lower()
              title = re.sub(r"\s+", " ", title)
              title = re.sub(r"[^\w\u4e00-\u9fff ]+", "", title)
              return title.strip()

          def resolve_google_news_url(url):
              try:
                  req = urllib.request.Request(url, headers=BROWSER_HEADERS)
                  opener = urllib.request.build_opener(urllib.request.HTTPRedirectHandler())
                  with opener.open(req, timeout=20) as resp:
                      return resp.geturl()
              except Exception:
                  return url

          def parse_rss(url, source_label, max_items=10, resolve_google=False):
              items = []
              try:
                  xml_data = fetch_bytes(url)
                  root = ET.fromstring(xml_data)
                  channel = root.find("channel")
                  if channel is not None:
                      for item in channel.findall("item"):
                          title = clean_title(item.findtext("title", default=""))
                          link = item.findtext("link", default="").strip()
                          pub_date = item.findtext("pubDate", default="").strip()
                          if not title or not link:
                              continue
                          final_link = resolve_google_news_url(link) if resolve_google else link
                          items.append({
                              "title": title,
                              "url": final_link,
                              "source": source_label,
                              "published_at": to_iso8601(pub_date)
                          })
                          if len(items) >= max_items:
                              break
              except Exception as e:
                  items.append({
                      "title": f"{source_label} 抓取失敗：{str(e)}",
                      "url": url,
                      "source": "System Fallback",
                      "published_at": now_iso()
                  })
              return items

          def dedupe_against(base_items, target_items, limit=10):
              base_titles = {normalize_title(x.get("title", "")) for x in base_items if x.get("title")}
              output = []
              seen = set()
              for item in target_items:
                  t = normalize_title(item.get("title", ""))
                  if not t:
                      continue
                  if t in base_titles:
                      continue
                  if t in seen:
                      continue
                  seen.add(t)
                  output.append(item)
                  if len(output) >= limit:
                      break
              return output

          def strip_tags(text):
              text = re.sub(r"<script.*?>.*?</script>", "", text, flags=re.S | re.I)
              text = re.sub(r"<style.*?>.*?</style>", "", text, flags=re.S | re.I)
              text = re.sub(r"<[^>]+>", " ", text)
              text = unescape(text)
              text = re.sub(r"\s+", " ", text).strip()
              return text

          def parse_udn_global(url, max_items=7):
              try:
                  html = fetch_text(url)
                  patterns = [
                      re.compile(r'<a[^>]+href="(https://global\.udn\.com/global_vision/story/[^"]+)"[^>]*>(.*?)</a>', re.I | re.S),
                      re.compile(r'<a[^>]+href="(\/global_vision\/story\/[^"]+)"[^>]*>(.*?)</a>', re.I | re.S),
                  ]
                  seen = set()
                  items = []
                  for pattern in patterns:
                      for match in pattern.finditer(html):
                          article_url = match.group(1).strip()
                          if article_url.startswith("/"):
                              article_url = "https://global.udn.com" + article_url
                          title = strip_tags(match.group(2))
                          if not title or len(title) < 8 or article_url in seen:
                              continue
                          seen.add(article_url)
                          items.append({
                              "title": title,
                              "url": article_url,
                              "source": "udn 轉角國際",
                              "published_at": now_iso()
                          })
                          if len(items) >= max_items:
                              return items
                  return []
              except Exception:
                  return []

          def parse_koc(url, max_items=7):
              try:
                  html = fetch_text(url)
                  patterns = [
                      re.compile(r'<a[^>]+href="(https://www\.koc\.com\.tw/archives/\d+/?)"[^>]*>(.*?)</a>', re.I | re.S),
                      re.compile(r'<a[^>]+href="(/archives/\d+/?)"[^>]*>(.*?)</a>', re.I | re.S),
                  ]
                  seen = set()
                  items = []
                  for pattern in patterns:
                      for match in pattern.finditer(html):
                          article_url = match.group(1).strip()
                          if "/category/" in article_url:
                              continue
                          if article_url.startswith("/"):
                              article_url = "https://www.koc.com.tw" + article_url
                          title = strip_tags(match.group(2))
                          if not title or len(title) < 6:
                              continue
                          if title in ["最新科技新聞", "AI 新聞與教學", "AI 工具分享與教學"]:
                              continue
                          if article_url in seen:
                              continue
                          seen.add(article_url)
                          items.append({
                              "title": title,
                              "url": article_url,
                              "source": "電腦王阿達",
                              "published_at": now_iso()
                          })
                          if len(items) >= max_items:
                              return items
                  return []
              except Exception:
                  return []

          international_items = parse_rss(GOOGLE_NEWS_INTL, "Google News International", max_items=15, resolve_google=True)
          usa_raw_items = parse_rss(GOOGLE_NEWS_USA, "Google News USA", max_items=25, resolve_google=True)
          usa_items = dedupe_against(international_items, usa_raw_items, limit=10)

          tech_items = parse_rss(GOOGLE_NEWS_TECH, "Google News AI / Tech", max_items=10, resolve_google=True)
          taiwan_items = parse_rss(GOOGLE_NEWS_TAIWAN, "Google News Taiwan", max_items=10, resolve_google=True)
          health_items = parse_rss(GOOGLE_NEWS_HEALTH, "Google News Health / Medical", max_items=7, resolve_google=True)

          udn_items = parse_udn_global(UDN_GLOBAL_URL, max_items=7)
          koc_items = parse_koc(KOC_URL, max_items=7)

          fm_main_items = parse_rss(FM_MAIN, "Frequent Miler", max_items=5, resolve_google=False)
          fm_quick_items = parse_rss(FM_QUICK, "Frequent Miler Quick Deals", max_items=5, resolve_google=False)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

          data = {
              "updated_at": now_iso(),
              "international": international_items,
              "usa": usa_items,
              "tech_science": tech_items,
              "taiwan": taiwan_items,
              "health": health_items,
              "udn_global": udn_items,
              "koc": koc_items,
              "frequent_miler": fm_main_items,
              "frequent_miler_quick_deals": fm_quick_items
          }
      - name: Install dependencies
        run: npm ci

          with open("news.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          PY
      - name: Update news.json
        run: node scripts/update-news.js

      - name: Commit changes
      - name: Commit and push changes
run: |
         git config user.name "github-actions[bot]"
         git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "Auto-update news.json"

      - name: Push changes
        run: |
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
          git add public/news.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update news.json"
          git push

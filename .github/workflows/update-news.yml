name: Update News Feed

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate news.json
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import socket
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone
          from email.utils import parsedate_to_datetime
          from html import unescape

          GOOGLE_NEWS_INTL = "https://news.google.com/rss/topics/CAAqKggKIiRDQkFTRlFvSUwyMHZNRGx1YlY4U0JYcG9MVlJYR2dKVVZ5Z0FQAQ?hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
          GOOGLE_NEWS_TECH = "https://news.google.com/rss/topics/CAAqLAgKIiZDQkFTRmdvSkwyMHZNR1ptZHpWbUVnVjZhQzFVVnhvQ1ZGY29BQVAB?hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
          GOOGLE_NEWS_USA = "https://news.google.com/rss/search?q=%E7%BE%8E%E5%9C%8B&hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
          GOOGLE_NEWS_TAIWAN = "https://news.google.com/rss/topics/CAAqJQgKIh9DQkFTRVFvSUwyMHZNRFptTXpJU0JYcG9MVlJYS0FBUAE?hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
          GOOGLE_NEWS_HEALTH = "https://news.google.com/rss/topics/CAAqJQgKIh9DQkFTRVFvSUwyMHZNR3QwTlRFU0JYcG9MVlJYS0FBUAE?hl=zh-TW&gl=TW&ceid=TW:zh-Hant"

          UDN_GLOBAL_URL = "https://global.udn.com/global_vision/index"
          KOC_FEED = "https://www.koc.com.tw/feed"
          USCCG_EN_URL = "https://www.uscreditcardguide.com/en/"
          USCARDFORUM_TOP_URL = "https://www.uscardforum.com/top"
          DOCTOR_OF_CREDIT_URL = "https://www.doctorofcredit.com/"
          FM_MAIN = "https://frequentmiler.com/feed/"
          FM_QUICK = "https://frequentmiler.com/category/quick-deals/feed/"

          BROWSER_HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "zh-TW,zh;q=0.9,en-US;q=0.8,en;q=0.7",
              "Cache-Control": "no-cache",
              "Pragma": "no-cache",
          }

          REQUEST_TIMEOUT = 20
          MAX_RETRIES = 3
          BACKOFF_SCHEDULE = [1.5, 3, 6]
          NEWS_JSON_PATH = "news.json"


          def now_iso():
              return datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")


          def is_retryable_http_error(code):
              return code in (408, 425, 429, 500, 502, 503, 504)


          def request_with_retry(url, decode_text=False, timeout=REQUEST_TIMEOUT):
              last_error = None

              for attempt in range(MAX_RETRIES):
                  try:
                      req = urllib.request.Request(url, headers=BROWSER_HEADERS)
                      with urllib.request.urlopen(req, timeout=timeout) as resp:
                          if decode_text:
                              charset = resp.headers.get_content_charset() or "utf-8"
                              return resp.read().decode(charset, errors="ignore")
                          return resp.read()
                  except urllib.error.HTTPError as e:
                      last_error = e
                      if not is_retryable_http_error(getattr(e, "code", None)):
                          break
                  except (urllib.error.URLError, socket.timeout, TimeoutError) as e:
                      last_error = e
                  except Exception as e:
                      last_error = e
                      break

                  if attempt < MAX_RETRIES - 1:
                      time.sleep(BACKOFF_SCHEDULE[min(attempt, len(BACKOFF_SCHEDULE) - 1)])

              raise last_error


          def fetch_bytes(url):
              return request_with_retry(url, decode_text=False, timeout=REQUEST_TIMEOUT)


          def fetch_text(url):
              return request_with_retry(url, decode_text=True, timeout=REQUEST_TIMEOUT)


          def to_iso8601(dt_str):
              try:
                  dt = parsedate_to_datetime(dt_str)
                  if dt.tzinfo is None:
                      dt = dt.replace(tzinfo=timezone.utc)
                  return dt.astimezone(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
              except Exception:
                  return dt_str or ""


          def clean_title(title):
              title = unescape(title or "").strip()
              title = re.sub(r"\s+", " ", title)
              title = re.sub(r"\s*-\s*[^-]+$", "", title)
              return title


          def strip_tags(text):
              text = re.sub(r"<script.*?>.*?</script>", "", text, flags=re.S | re.I)
              text = re.sub(r"<style.*?>.*?</style>", "", text, flags=re.S | re.I)
              text = re.sub(r"<[^>]+>", " ", text)
              text = unescape(text)
              text = re.sub(r"\s+", " ", text).strip()
              return text


          def slugify_title(title):
              t = title.strip().lower()
              t = re.sub(r"[^\w\s-]", "", t, flags=re.U)
              t = re.sub(r"\s+", "-", t)
              t = re.sub(r"-+", "-", t).strip("-")
              return t


          def resolve_google_news_url(url):
              last_error = None

              for attempt in range(MAX_RETRIES):
                  try:
                      req = urllib.request.Request(url, headers=BROWSER_HEADERS)
                      opener = urllib.request.build_opener(urllib.request.HTTPRedirectHandler())
                      with opener.open(req, timeout=15) as resp:
                          return resp.geturl()
                  except urllib.error.HTTPError as e:
                      last_error = e
                      if not is_retryable_http_error(getattr(e, "code", None)):
                          break
                  except (urllib.error.URLError, socket.timeout, TimeoutError) as e:
                      last_error = e
                  except Exception as e:
                      last_error = e
                      break

                  if attempt < MAX_RETRIES - 1:
                      time.sleep(BACKOFF_SCHEDULE[min(attempt, len(BACKOFF_SCHEDULE) - 1)])

              return url


          def parse_rss(url, source_label, max_items=10, resolve_google=False):
              items = []
              try:
                  xml_data = fetch_bytes(url)
                  root = ET.fromstring(xml_data)
                  channel = root.find("channel")
                  if channel is not None:
                      for item in channel.findall("item"):
                          title = clean_title(item.findtext("title", default=""))
                          link = item.findtext("link", default="").strip()
                          pub_date = item.findtext("pubDate", default="").strip()
                          if not title or not link:
                              continue
                          final_link = resolve_google_news_url(link) if resolve_google else link
                          items.append({
                              "title": title,
                              "url": final_link,
                              "source": source_label,
                              "published_at": to_iso8601(pub_date)
                          })
                          if len(items) >= max_items:
                              break
              except Exception as e:
                  items.append({
                      "title": f"{source_label} 抓取失敗：{str(e)}",
                      "url": url,
                      "source": "System Fallback",
                      "published_at": now_iso()
                  })
              return items


          def parse_udn_global(url, max_items=7):
              try:
                  html = fetch_text(url)
                  patterns = [
                      re.compile(r'<a[^>]+href="(https://global\.udn\.com/global_vision/story/[^"]+)"[^>]*>(.*?)</a>', re.I | re.S),
                      re.compile(r'<a[^>]+href="(/global_vision/story/[^"]+)"[^>]*>(.*?)</a>', re.I | re.S),
                  ]
                  seen = set()
                  items = []
                  for pattern in patterns:
                      for match in pattern.finditer(html):
                          article_url = match.group(1).strip()
                          if article_url.startswith("/"):
                              article_url = "https://global.udn.com" + article_url
                          title = strip_tags(match.group(2))
                          if not title or len(title) < 8 or article_url in seen:
                              continue
                          seen.add(article_url)
                          items.append({
                              "title": title,
                              "url": article_url,
                              "source": "udn 轉角國際",
                              "published_at": now_iso()
                          })
                          if len(items) >= max_items:
                              return items
                  return []
              except Exception:
                  return []


          def parse_usccg_en(url, max_items=7):
              try:
                  html = fetch_text(url)

                  pattern = re.compile(
                      r'<h2[^>]*>\s*<a[^>]+href="([^"]+)"[^>]*>(.*?)</a>\s*</h2>',
                      re.I | re.S
                  )

                  seen = set()
                  items = []

                  for match in pattern.finditer(html):
                      article_url = match.group(1).strip()
                      title = clean_title(strip_tags(match.group(2)))

                      if article_url.startswith("/"):
                          article_url = "https://www.uscreditcardguide.com" + article_url

                      if not article_url.startswith("https://www.uscreditcardguide.com/"):
                          continue
                      if article_url in ("https://www.uscreditcardguide.com/", "https://www.uscreditcardguide.com/en/"):
                          continue
                      if "/author/" in article_url or "/tag/" in article_url or "/page/" in article_url or "/category/" in article_url:
                          continue
                      if len(title) < 8:
                          continue
                      if article_url in seen:
                          continue

                      seen.add(article_url)
                      items.append({
                          "title": title,
                          "url": article_url,
                          "source": "US Credit Card Guide",
                          "published_at": now_iso()
                      })

                      if len(items) >= max_items:
                          break

                  if not items:
                      return [{
                          "title": "US Credit Card Guide 目前沒有可用新聞項目",
                          "url": url,
                          "source": "System Empty Feed",
                          "published_at": now_iso()
                      }]

                  return items

              except Exception as e:
                  return [{
                      "title": f"US Credit Card Guide 抓取失敗：{str(e)}",
                      "url": url,
                      "source": "System Fallback",
                      "published_at": now_iso()
                  }]


          def parse_uscardforum_top(url, max_items=15):
              try:
                  html = fetch_text(url)
                  lines = [line.strip() for line in html.splitlines() if line.strip()]

                  items = []
                  seen = set()
                  header_seen = False

                  for line in lines:
                      if line.startswith("|话题") or line.startswith("|--"):
                          header_seen = True
                          continue
                      if not header_seen:
                          continue
                      if not line.startswith("|"):
                          continue

                      parts = [p.strip() for p in line.split("|")]
                      if len(parts) < 3:
                          continue

                      title = clean_title(parts[1])

                      if not title or len(title) < 4:
                          continue
                      if title in ("话题", "--"):
                          continue
                      if title in seen:
                          continue

                      seen.add(title)
                      slug = slugify_title(title) or "topic"
                      article_url = f"{url}#top-{urllib.parse.quote(slug)}"

                      items.append({
                          "title": title,
                          "url": article_url,
                          "source": "美卡論壇 Top",
                          "published_at": now_iso()
                      })

                      if len(items) >= max_items:
                          break

                  if not items:
                      return [{
                          "title": "美卡論壇 Top 目前沒有可用話題",
                          "url": url,
                          "source": "System Empty Feed",
                          "published_at": now_iso()
                      }]

                  return items

              except Exception as e:
                  return [{
                      "title": f"美卡論壇 Top 抓取失敗：{str(e)}",
                      "url": url,
                      "source": "System Fallback",
                      "published_at": now_iso()
                  }]


          def parse_doctor_of_credit(url, max_items=15):
              try:
                  html = fetch_text(url)

                  latest_idx = html.find("# Latest articles")
                  segment = html[latest_idx:] if latest_idx != -1 else html

                  lines = [line.strip() for line in segment.splitlines() if line.strip()]
                  items = []
                  seen = set()

                  for line in lines:
                      if "Read More" not in line:
                          continue

                      title = clean_title(strip_tags(line.replace("Read More →", "").replace("Read More", "")))

                      if not title or len(title) < 12:
                          continue
                      if title in seen:
                          continue

                      seen.add(title)
                      article_url = "https://www.google.com/search?q=" + urllib.parse.quote(f'site:doctorofcredit.com "{title}"')

                      items.append({
                          "title": title,
                          "url": article_url,
                          "source": "Doctor of Credit",
                          "published_at": now_iso()
                      })

                      if len(items) >= max_items:
                          break

                  if not items:
                      return [{
                          "title": "Doctor of Credit 目前沒有可用文章",
                          "url": url,
                          "source": "System Empty Feed",
                          "published_at": now_iso()
                      }]

                  return items

              except Exception as e:
                  return [{
                      "title": f"Doctor of Credit 抓取失敗：{str(e)}",
                      "url": url,
                      "source": "System Fallback",
                      "published_at": now_iso()
                  }]


          def load_previous_data():
              if not os.path.exists(NEWS_JSON_PATH):
                  return {}
              try:
                  with open(NEWS_JSON_PATH, "r", encoding="utf-8") as f:
                      return json.load(f)
              except Exception:
                  return {}


          def is_failed_result(items):
              if not items:
                  return True
              if len(items) != 1:
                  return False
              source = str(items[0].get("source", "")).strip()
              return source in ("System Fallback", "System Empty Feed")


          def mark_as_stale(items):
              stale_items = []
              for item in items:
                  if isinstance(item, dict):
                      copied = dict(item)
                      copied["stale"] = True
                      stale_items.append(copied)
              return stale_items


          def fallback_to_previous(items, category_key, previous_data):
              if not is_failed_result(items):
                  return items
              prev_items = previous_data.get(category_key, [])
              if isinstance(prev_items, list) and prev_items:
                  return mark_as_stale(prev_items)
              return items


          def main():
              previous_data = load_previous_data()

              international_items = fallback_to_previous(
                  parse_rss(GOOGLE_NEWS_INTL, "Google News International", max_items=20, resolve_google=True),
                  "international",
                  previous_data
              )
              tech_items = fallback_to_previous(
                  parse_rss(GOOGLE_NEWS_TECH, "Google News AI / Tech", max_items=20, resolve_google=True),
                  "tech_science",
                  previous_data
              )
              usa_items = fallback_to_previous(
                  parse_rss(GOOGLE_NEWS_USA, "Google News USA", max_items=10, resolve_google=True),
                  "usa",
                  previous_data
              )
              taiwan_items = fallback_to_previous(
                  parse_rss(GOOGLE_NEWS_TAIWAN, "Google News Taiwan", max_items=10, resolve_google=True),
                  "taiwan",
                  previous_data
              )
              health_items = fallback_to_previous(
                  parse_rss(GOOGLE_NEWS_HEALTH, "Google News Health / Medical", max_items=7, resolve_google=True),
                  "health",
                  previous_data
              )
              udn_items = fallback_to_previous(
                  parse_udn_global(UDN_GLOBAL_URL, max_items=7),
                  "udn_global",
                  previous_data
              )
              koc_items = fallback_to_previous(
                  parse_rss(KOC_FEED, "電腦王阿達", max_items=7, resolve_google=False),
                  "koc",
                  previous_data
              )
              usccg_en_items = fallback_to_previous(
                  parse_usccg_en(USCCG_EN_URL, max_items=7),
                  "usccg_en",
                  previous_data
              )
              fm_main_items = fallback_to_previous(
                  parse_rss(FM_MAIN, "Frequent Miler", max_items=5, resolve_google=False),
                  "frequent_miler",
                  previous_data
              )
              fm_quick_items = fallback_to_previous(
                  parse_rss(FM_QUICK, "Frequent Miler Quick Deals", max_items=5, resolve_google=False),
                  "frequent_miler_quick_deals",
                  previous_data
              )
              uscardforum_top_items = fallback_to_previous(
                  parse_uscardforum_top(USCARDFORUM_TOP_URL, max_items=15),
                  "uscardforum_top",
                  previous_data
              )
              doc_items = fallback_to_previous(
                  parse_doctor_of_credit(DOCTOR_OF_CREDIT_URL, max_items=15),
                  "doctor_of_credit",
                  previous_data
              )

              data = {
                  "updated_at": now_iso(),
                  "international": international_items,
                  "tech_science": tech_items,
                  "usa": usa_items,
                  "taiwan": taiwan_items,
                  "health": health_items,
                  "udn_global": udn_items,
                  "koc": koc_items,
                  "usccg_en": usccg_en_items,
                  "frequent_miler": fm_main_items,
                  "frequent_miler_quick_deals": fm_quick_items,
                  "uscardforum_top": uscardforum_top_items,
                  "doctor_of_credit": doc_items
              }

              with open(NEWS_JSON_PATH, "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)


          if __name__ == "__main__":
              main()
          PY

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update news.json"
          git push

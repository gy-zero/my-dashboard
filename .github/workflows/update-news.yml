name: Update News Feed

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: update-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Verify repository files
        run: |
          pwd
          ls -la
          ls -la scripts

      - name: Generate news.json
        run: python scripts/update_news.py

      - name: Verify generated file
        run: |
          test -f news.json
          python - <<'PY'
          import json
          with open("news.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          print("news.json ok")
          print("keys:", sorted(data.keys()))
          print("updated_at:", data.get("updated_at"))
          PY

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update news.json"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
